name: Run Traffic Generator UI
on: 
  workflow_dispatch:
    inputs:
      duration:
        description: 'Select how long to run the generator'
        required: true
        default: '1h'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h 40m'

jobs:
  launch-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/davytheprogrammer/Website-Traffic-Generator-web-version.git .
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install gradio

      - name: Create Bridge Script
        run: |
          cat <<EOF > bridge.py
          import os, threading, gradio as gr, time
          def run_app(): 
              os.system("python app.py")
          
          # Start the traffic generator in a background thread
          threading.Thread(target=run_app, daemon=True).start()
          
          # Wait for Flask to initialize
          time.sleep(10)
          
          # Create the Gradio interface
          with gr.Blocks(title="Traffic Gen Dashboard") as demo:
              gr.Markdown("### 🚀 Traffic Generator is running")
              gr.HTML('<iframe src="http://localhost:5000" style="width:100%; height:90vh; border:none;"></iframe>')
          
          # Launch Gradio with a public URL
          demo.launch(share=True)
          EOF

      - name: Launch with Duration
        run: |
          # Convert input string to actual seconds for the timeout command
          DURATION_INPUT="${{ github.event.inputs.duration }}"
          
          if [ "$DURATION_INPUT" == "1h" ]; then
            SECONDS=3600
          elif [ "$DURATION_INPUT" == "3h" ]; then
            SECONDS=10800
          else
            # 5 hours (18000) + 40 minutes (2400) = 20400 seconds
            SECONDS=20400
          fi
          
          echo "Starting application for $DURATION_INPUT ($SECONDS seconds)..."
          
          # Use the 'timeout' command to kill the process after the chosen time
          timeout $SECONDS python bridge.py || echo "Time limit reached. Shutting down."

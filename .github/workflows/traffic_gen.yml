name: Run Traffic Generator UI
on: 
  workflow_dispatch:
    inputs:
      duration:
        description: 'Select how long to run the generator'
        required: true
        default: '1h'
        type: choice
        options:
          - '1h'
          - '3h'
          - '5h 40m'

jobs:
  launch-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/davytheprogrammer/Website-Traffic-Generator-web-version.git .
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install gradio

      - name: Create Bridge Script
        run: |
          cat <<EOF > bridge.py
          import subprocess
          import gradio as gr
          import time
          import sys
          import os

          # Force flush all prints
          print("--- Starting Flask Traffic Generator ---", flush=True)
          
          # Run Flask in the background with unbuffered output
          proc = subprocess.Popen([sys.executable, "-u", "app.py"])

          print("Waiting 15 seconds for local server to stabilize...", flush=True)
          time.sleep(15)

          print("--- Launching Gradio Public Tunnel ---", flush=True)
          with gr.Blocks(title="Traffic Generator Dashboard") as demo:
              gr.Markdown("## 🚀 Web Traffic Generator Gateway")
              gr.HTML('<iframe src="http://localhost:5000" style="width:100%; height:85vh; border:none;"></iframe>')
          
          # Use server_name="0.0.0.0" and share=True
          demo.launch(share=True, inline=False, server_name="0.0.0.0")

          try:
              while True:
                  time.sleep(10)
          except KeyboardInterrupt:
              proc.terminate()
          EOF

      - name: Launch with Duration
        run: |
          DURATION_INPUT="${{ github.event.inputs.duration }}"
          
          if [ "$DURATION_INPUT" == "1h" ]; then
            SECONDS=3600
          elif [ "$DURATION_INPUT" == "3h" ]; then
            SECONDS=10800
          else
            SECONDS=20400
          fi
          
          echo "Workflow will run for $DURATION_INPUT ($SECONDS seconds)."
          
          # Use python -u for unbuffered output so you see the URL immediately
          timeout $SECONDS python -u bridge.py || echo "Duration limit reached. Shutting down."
